<!DOCTYPE html>
<html lang="es">
  <head>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght;500;600;700&family=Playfair+Display:wght;700&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0b0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>SIGAM</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
  <body>
    <div id="root">
      <div id="app-fallback" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0b0f;color:#94a3b8;font-family:Inter,sans-serif;text-align:center;padding:20px;">
        <div>
          <div style="width:48px;height:48px;border-radius:12px;background:#1F2A44;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
            <span style="color:#C8A03A;font-size:18px;font-weight:bold;">SIGAM</span>
          </div>
          <p style="margin:0;font-size:14px;">Cargando SIGAM...</p>
        </div>
      </div>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var fb = document.getElementById('app-fallback');
        if (fb) {
          fb.innerHTML = '<div><p style="color:#ef4444;font-size:16px;font-weight:600;">Error al cargar la aplicación</p><p style="color:#94a3b8;font-size:13px;max-width:400px;margin:8px auto;">' + (e.message || 'Error desconocido') + '</p><button onclick="location.reload()" style="margin-top:12px;padding:8px 24px;border-radius:8px;border:none;background:#C8A03A;color:white;cursor:pointer;font-size:14px;">Recargar</button></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
